<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>中国宏观经济监测 — 实时数据与政策追踪</title>
<meta name="description" content="中国宏观经济数据监测平台，涵盖GDP、CPI、PMI、社融等核心指标与政策要闻实时更新">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --card-bg: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --red: #e63946;
  --green: #16a34a;
  --blue: #2563eb;
  --orange: #f59e0b;
  --purple: #7c3aed;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.08);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: .2s ease;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1a1a2e 100%); color: #fff; padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
.header-inner { max-width: 1280px; margin: 0 auto; padding: 20px 24px; }
.header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 1.65rem; font-weight: 700; letter-spacing: .5px; display: flex; align-items: center; gap: 10px; }
.header h1 .icon { width: 36px; height: 36px; background: rgba(255,255,255,.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
.header-sub { font-size: .875rem; color: rgba(255,255,255,.7); margin-top: 4px; }
.live-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--red); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: .75rem; font-weight: 600; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
.live-dot { width: 7px; height: 7px; background: #fff; border-radius: 50%; }
.header-meta { display: flex; align-items: center; gap: 16px; margin-top: 8px; font-size: .8rem; color: rgba(255,255,255,.55); flex-wrap: wrap; }
.header-meta span { display: inline-flex; align-items: center; gap: 4px; }
.source-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-size: .78rem; color: rgba(255,255,255,.45); }

/* Main Layout */
.main { max-width: 1280px; margin: 0 auto; padding: 24px; }

/* Dashboard */
.dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
@media (max-width: 1024px) { .dashboard { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .dashboard { grid-template-columns: 1fr; } }

.index-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); transition: var(--transition); cursor: default; }
.index-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.index-card .card-label { font-size: .8rem; color: var(--text-muted); margin-bottom: 6px; }
.index-card .card-value { font-size: 1.75rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.index-card .card-change { font-size: .9rem; margin-top: 4px; font-weight: 500; }
.up { color: var(--red); }
.down { color: var(--green); }
.flat { color: var(--text-muted); }

/* Section */
.section-title { font-size: 1.15rem; font-weight: 700; margin: 32px 0 16px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ""; width: 4px; height: 20px; background: var(--blue); border-radius: 2px; }

/* Macro Cards Grid */
.macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
@media (max-width: 768px) { .macro-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .macro-grid { grid-template-columns: 1fr; } }
.macro-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border-left: 4px solid var(--blue); transition: var(--transition); }
.macro-card:hover { box-shadow: var(--shadow-lg); }
.macro-card .mc-label { font-size: .8rem; color: var(--text-secondary); margin-bottom: 6px; }
.macro-card .mc-value { font-size: 1.4rem; font-weight: 700; }
.macro-card .mc-period { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
.macro-card .mc-change { font-size: .82rem; margin-top: 4px; font-weight: 500; }
.macro-card.policy { border-left-color: var(--red); }
.macro-card.market { border-left-color: var(--blue); }
.macro-card.macro { border-left-color: var(--green); }
.macro-card.industry { border-left-color: var(--orange); }

/* Charts Grid */
.charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-panel { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.chart-panel h3 { font-size: .95rem; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.chart-wrap { position: relative; width: 100%; height: 280px; }
.chart-wrap canvas { width: 100% !important; }

/* Filters */
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn { padding: 7px 18px; border: 1.5px solid var(--border); background: var(--card-bg); border-radius: 20px; cursor: pointer; font-size: .88rem; font-weight: 500; transition: var(--transition); color: var(--text-secondary); }
.filter-btn:hover { border-color: var(--blue); color: var(--blue); }
.filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.filter-btn .count { font-size: .75rem; opacity: .7; margin-left: 4px; }
.sort-toggle { margin-left: auto; padding: 7px 16px; border: 1.5px solid var(--border); background: var(--card-bg); border-radius: 20px; cursor: pointer; font-size: .85rem; transition: var(--transition); display: flex; align-items: center; gap: 4px; }
.sort-toggle:hover { border-color: var(--text-secondary); }

/* Timeline */
.timeline { }
.date-group { margin-bottom: 28px; }
.date-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
.date-header .date-text { font-size: 1.1rem; font-weight: 700; }
.date-header .weekday { font-size: .85rem; color: var(--text-muted); }
.date-divider { flex: 1; height: 1px; background: var(--border); }

.entry-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px 22px; margin-bottom: 12px; box-shadow: var(--shadow); transition: var(--transition); border-left: 4px solid transparent; position: relative; }
.entry-card:hover { box-shadow: var(--shadow-lg); }
.entry-card.cat-policy { border-left-color: var(--red); }
.entry-card.cat-market { border-left-color: var(--blue); }
.entry-card.cat-macro { border-left-color: var(--green); }
.entry-card.cat-industry { border-left-color: var(--orange); }
.entry-card .cat-tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: .75rem; font-weight: 600; margin-bottom: 8px; }
.cat-policy .cat-tag { background: #fef2f2; color: var(--red); }
.cat-market .cat-tag { background: #eff6ff; color: var(--blue); }
.cat-macro .cat-tag { background: #f0fdf4; color: var(--green); }
.cat-industry .cat-tag { background: #fffbeb; color: #d97706; }
.entry-card .entry-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; line-height: 1.5; color: var(--text); }
.entry-card .entry-summary { font-size: .9rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 10px; }
.entry-card .entry-body { font-size: .88rem; color: var(--text-secondary); line-height: 1.75; margin-bottom: 12px; display: none; }
.entry-card.expanded .entry-body { display: block; }
.entry-card .entry-sources { font-size: .78rem; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.entry-card .entry-sources .src-dot { width: 4px; height: 4px; background: var(--text-muted); border-radius: 50%; }
.entry-card .entry-actions { display: flex; gap: 12px; margin-top: 10px; }
.entry-card .expand-btn { background: none; border: none; color: var(--blue); cursor: pointer; font-size: .82rem; padding: 0; font-weight: 500; }
.entry-card .expand-btn:hover { text-decoration: underline; }
.entry-card .analysis-list { margin-top: 10px; padding: 12px 16px; background: #f8fafc; border-radius: var(--radius-sm); display: none; font-size: .85rem; color: var(--text-secondary); }
.entry-card.expanded .analysis-list { display: block; }
.entry-card .analysis-list li { margin-bottom: 4px; line-height: 1.6; }
.entry-card .analysis-list li::marker { color: var(--blue); }

/* Footer */
.footer { text-align: center; padding: 32px 24px; color: var(--text-muted); font-size: .8rem; border-top: 1px solid var(--border); margin-top: 40px; }
.footer a { color: var(--text-secondary); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-muted); }
.loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1><span class="icon">📊</span>中国宏观经济监测</h1>
        <p class="header-sub">China Macro Economy Monitor — 核心数据与政策要闻实时追踪</p>
      </div>
      <div class="live-badge"><span class="live-dot"></span> LIVE</div>
    </div>
    <div class="header-meta">
      <span>📅 覆盖范围：GDP · CPI · PPI · PMI · 社融 · M2 · A股 · 债市 · 汇市</span>
      <span id="updateTime">最后更新：加载中...</span>
      <span id="updateFreq"></span>
    </div>
    <div class="source-bar">数据来源：同花顺iFinD · 国家统计局 · 中国人民银行 · 财政部 · 工信部</div>
  </div>
</header>

<main class="main">

  <!-- Dashboard: Market Indices -->
  <div class="section-title">📈 市场概览</div>
  <div class="dashboard" id="indexDashboard"></div>

  <!-- Dashboard: Macro Cards -->
  <div class="section-title">📐 核心宏观指标</div>
  <div class="macro-grid" id="macroDashboard"></div>

  <!-- Charts -->
  <div class="section-title">📉 数据图表</div>
  <div class="charts-grid" id="chartsGrid"></div>

  <!-- Timeline Filter -->
  <div class="section-title">📰 经济日历</div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all">全部<span class="count" id="countAll"></span></button>
    <button class="filter-btn" data-cat="policy">📋 政策要闻<span class="count" id="countPolicy"></span></button>
    <button class="filter-btn" data-cat="market">📊 市场数据<span class="count" id="countMarket"></span></button>
    <button class="filter-btn" data-cat="macro">📐 宏观经济<span class="count" id="countMacro"></span></button>
    <button class="filter-btn" data-cat="industry">🏭 行业动态<span class="count" id="countIndustry"></span></button>
    <button class="sort-toggle" id="sortToggle" title="切换排序">⏳ <span id="sortLabel">最新在前</span></button>
  </div>

  <!-- Timeline Feed -->
  <div class="timeline" id="timelineFeed">
    <div class="loading"><div class="loading-spinner"></div><p>加载数据中...</p></div>
  </div>

</main>

<footer class="footer">
  <p>中国宏观经济监测平台 · 数据来源：同花顺iFinD MCP · 国家统计局 · 中国人民银行</p>
  <p style="margin-top:4px">更新时间：每日 8:00 / 16:00 / 24:00 自动更新 · <span id="footerUpdate"></span></p>
</footer>

<script>
// ===== Data Loading =====
let indicatorsData = null;
let timelineData = null;
let activeCategory = 'all';
let sortAsc = false;
let charts = {};

async function loadData() {
  try {
    const [indResp, tlResp] = await Promise.all([
      fetch('data/indicators.json?v=' + Date.now()),
      fetch('data/timeline.json?v=' + Date.now())
    ]);
    indicatorsData = await indResp.json();
    timelineData = await tlResp.json();
    renderAll();
  } catch(e) {
    console.error('Data load error:', e);
    // Try once more after 2s (common CDN propagation delay)
    setTimeout(async () => {
      try {
        const [ir, tr] = await Promise.all([
          fetch('data/indicators.json?v=2'),
          fetch('data/timeline.json?v=2')
        ]);
        if (!ir.ok || !tr.ok) throw new Error('retry fetch failed');
        indicatorsData = await ir.json();
        timelineData = await tr.json();
        renderAll();
      } catch(e2) {
        document.getElementById('timelineFeed').innerHTML =
          '<div class="empty-state"><div class="empty-icon">⚠️</div><p>数据加载失败，请 <a href="javascript:location.reload(true)">强制刷新</a> (Ctrl+Shift+R)</p></div>';
      }
    }, 2000);
    // Show loading state during retry
    document.getElementById('timelineFeed').innerHTML =
      '<div class="loading"><div class="loading-spinner"></div><p>正在重试加载...</p></div>';
  }
}

// ===== Render =====
function renderAll() {
  renderIndices();
  renderMacroCards();
  renderCharts();
  renderTimeline();
  updateCounts();
  updateTimes();
}

function updateTimes() {
  const t = indicatorsData?.lastUpdate || '';
  document.getElementById('updateTime').textContent = '最后更新：' + (t ? new Date(t).toLocaleString('zh-CN') : 'N/A');
  document.getElementById('updateFreq').textContent = indicatorsData?.updateFrequency || '';
  document.getElementById('footerUpdate').textContent = indicatorsData?.updateFrequency || '';
}

// Indices Dashboard
function renderIndices() {
  const indices = indicatorsData.dashboard.indices;
  const container = document.getElementById('indexDashboard');
  container.innerHTML = indices.map(idx => {
    const changeClass = idx.trend === 'up' ? 'up' : idx.trend === 'down' ? 'down' : 'flat';
    const arrow = idx.trend === 'up' ? '▲' : idx.trend === 'down' ? '▼' : '—';
    const unit = idx.unit || '';
    return `<div class="index-card">
      <div class="card-label">${idx.name}</div>
      <div class="card-value">${idx.value.toLocaleString('zh-CN',{minimumFractionDigits:idx.value%1?4:2})}${unit}</div>
      <div class="card-change ${changeClass}">${arrow} ${Math.abs(idx.change).toFixed(idx.value>100?2:4)} (${idx.changePercent>0?'+':''}${idx.changePercent.toFixed(2)}%)</div>
    </div>`;
  }).join('');
}

// Macro Cards
function renderMacroCards() {
  const cards = indicatorsData.dashboard.macroCards;
  document.getElementById('macroDashboard').innerHTML = cards.map(c => {
    const changeClass = c.trend === 'up' ? 'up' : c.trend === 'down' ? 'down' : 'flat';
    const arrow = c.trend === 'up' ? '▲' : c.trend === 'down' ? '▼' : '—';
    const unit = c.unit || '';
    return `<div class="macro-card">
      <div class="mc-label">${c.name}</div>
      <div class="mc-value">${c.value}${unit}</div>
      <div class="mc-period">${c.period}</div>
      <div class="mc-change ${changeClass}">${arrow} ${c.change>0?'+':''}${c.change}</div>
    </div>`;
  }).join('');
}

// Charts
function renderCharts() {
  const cd = indicatorsData.charts;
  const container = document.getElementById('chartsGrid');

  const panels = [
    { id: 'chartIdx', title: cd.indexTrend.title, type: 'line', labels: cd.indexTrend.labels, datasets: [{label:'上证指数',data:cd.indexTrend.data,borderColor:'#e63946',backgroundColor:'rgba(230,57,70,.08)',fill:true,tension:.3,pointRadius:1}] },
    { id: 'chartCpi', title: cd.cpiPpi.title, type: 'line', labels: cd.cpiPpi.labels, datasets: [{label:'CPI',data:cd.cpiPpi.cpi,borderColor:'#e63946',tension:.3,pointRadius:1},{label:'PPI',data:cd.cpiPpi.ppi,borderColor:'#16a34a',tension:.3,pointRadius:1}] },
    { id: 'chartPmi', title: cd.pmiTrend.title, type: 'line', labels: cd.pmiTrend.labels, datasets: [{label:'PMI',data:cd.pmiTrend.data,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.1)',fill:true,tension:.3,pointRadius:1}] },
    { id: 'chartM2', title: cd.m2SocialFinance.title, type: 'line', labels: cd.m2SocialFinance.labels, datasets: [{label:'M2增速',data:cd.m2SocialFinance.m2,borderColor:'#7c3aed',tension:.3,pointRadius:1},{label:'社融增速',data:cd.m2SocialFinance.socialFinance,borderColor:'#f59e0b',tension:.3,pointRadius:1}] }
  ];

  container.innerHTML = panels.map(p => `
    <div class="chart-panel">
      <h3>${p.title}</h3>
      <div class="chart-wrap"><canvas id="${p.id}"></canvas></div>
    </div>`).join('');

  // Destroy existing
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  panels.forEach(p => {
    const ctx = document.getElementById(p.id);
    if (!ctx) return;
    const hasNeg = p.datasets.some(d => d.data.some(v => v < 0));
    charts[p.id] = new Chart(ctx, {
      type: p.type,
      data: { labels: p.labels, datasets: p.datasets.map(d => ({...d,borderWidth:2})) },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20, font: { size: 11 } } },
          tooltip: { backgroundColor: 'rgba(15,23,42,.9)', titleFont: { size: 12 }, bodyFont: { size: 11 }, padding: 10 }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 8 } },
          y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } }
        }
      }
    });
  });
}

// Timeline
function renderTimeline() {
  let entries = timelineData.timeline;
  let dates = [...entries];

  // Sort
  if (sortAsc) dates.reverse();

  // Filter
  if (activeCategory !== 'all') {
    dates = dates.map(d => ({
      ...d,
      entries: d.entries.filter(e => e.category === activeCategory)
    })).filter(d => d.entries.length > 0);
  }

  const container = document.getElementById('timelineFeed');

  if (dates.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>该分类下暂无内容</p></div>';
    return;
  }

  container.innerHTML = dates.map(d => `
    <div class="date-group">
      <div class="date-header">
        <span class="date-text">📅 ${d.date}</span>
        <span class="weekday">${d.weekday}</span>
        <span class="date-divider"></span>
      </div>
      ${d.entries.map(e => `
        <div class="entry-card cat-${e.category}" data-id="${e.id}">
          <span class="cat-tag">${e.categoryLabel}</span>
          <div class="entry-title">${e.title}</div>
          <div class="entry-summary">${e.summary}</div>
          <div class="entry-body">${e.body.replace(/\n/g,'<br>')}</div>
          <div class="entry-sources">
            ${e.sources.map((s,i) => (i>0?'<span class="src-dot"></span>':'')+s).join('')}
          </div>
          <div class="entry-actions">
            <button class="expand-btn" onclick="toggleEntry(this)">展开详情 ▾</button>
          </div>
          <ul class="analysis-list">${(e.analysis||[]).map(a => `<li>${a}</li>`).join('')}</ul>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggleEntry(btn) {
  const card = btn.closest('.entry-card');
  card.classList.toggle('expanded');
  btn.textContent = card.classList.contains('expanded') ? '收起详情 ▴' : '展开详情 ▾';
}

// Filters
function updateCounts() {
  const all = timelineData.timeline.reduce((s,d) => s+d.entries.length, 0);
  document.getElementById('countAll').textContent = ` (${all})`;
  ['Policy','Market','Macro','Industry'].forEach(cat => {
    const lc = cat.toLowerCase();
    const cnt = timelineData.timeline.reduce((s,d) => s+d.entries.filter(e=>e.category===lc).length, 0);
    const el = document.getElementById('count'+cat);
    if (el) el.textContent = ` (${cnt})`;
  });
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    renderTimeline();
  }
  if (e.target.closest('#sortToggle')) {
    sortAsc = !sortAsc;
    document.getElementById('sortLabel').textContent = sortAsc ? '最早在前' : '最新在前';
    renderTimeline();
  }
});

// Load
loadData();
</script>
</body>
</html>
